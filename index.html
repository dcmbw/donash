<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Donash (Bridge)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>DONASH</h1>
            <div id="turn-display">Black's Turn</div>
            <button id="view-toggle">Switch to Tower View</button>
        </header>
        
        <div id="river-board" class="strategic-view"></div>

        <div id="ui-panel">
            <div class="stat-box">Black Pieces: <span id="black-hand">20</span></div>
            <div class="stat-box">White Pieces: <span id="white-hand">20</span></div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
